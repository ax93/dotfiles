[bar/mybar]
width = 100%
margin-top = 4
margin-bottom = 0
offset-x = 0
offset-y = 15px
height = 19pt
radius = 6

background = #00000000
foreground = #c8d5c0

line-size = 3pt
line-color = #2ea043
padding-left = 2
padding-right = 2
module-margin = 0

font-0 = "JetBrainsMono Nerd Font:size=10;3"
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=10;3"
font-2 = "Symbols Nerd Font:size=18;4"

modules-left = xworkspaces
modules-center = xwindow
modules-right = cpu memory date



[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-foreground = #2ea043
label-active-background = #1a4a2a
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = #7a8a78
label-occupied-padding = 1
label-empty = %name%
label-empty-foreground = #1f3329
label-empty-padding = 1
label-urgent = %name%
label-urgent-foreground = #8b1e1e
label-urgent-padding = 1


[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = #c8d5c0

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-prefix = "%{T3}%{T-}"
format-prefix-foreground = #162720
format-margin-right = 0
label = "CPU %percentage:2%% "
label-background = #162720
label-foreground = #c8d5c0

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-suffix = ""
format-suffix-foreground = #162720
format-maring-left = 0
label = "RAM %percentage_used:2%% "
label-foreground = #c8d5c0
label-background = #162720

[module/date]
type = internal/date
interval = 2
format = <label>
format-suffix = "%{T3}%{T-}"
format-suffix-foreground = #162720
format-maring-left = 0
label-foreground = #c8d5c0
label-background = #162720
date = %H:%M:%S
label = %date%

